name: Build and Deploy ZavaStorefront

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build container image using ACR Tasks
        # No local Docker required - image is built in the cloud by ACR
        run: |
          az acr build \
            --registry ${{ vars.AZURE_CONTAINER_REGISTRY_NAME }} \
            --image zavastorefront:${{ github.sha }} \
            --image zavastorefront:latest \
            --file src/Dockerfile \
            src/

      - name: Deploy to App Service
        run: |
          az webapp config container set \
            --name ${{ vars.AZURE_APP_SERVICE_NAME }} \
            --resource-group rg-zavastorefront-dev \
            --docker-custom-image-name ${{ vars.AZURE_CONTAINER_REGISTRY_NAME }}.azurecr.io/zavastorefront:${{ github.sha }}
